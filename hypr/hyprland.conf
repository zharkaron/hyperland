xwayland {
  force_zero_scaling = true
}

# ----- Touchpad swipe to switch workspaces (3 fingers) -----
gestures {
  gesture = 3, horizontal, workspace
}

general {
  gaps_in = 0
  gaps_out = 0
  layout = dwindle
}

dwindle {
  preserve_split = true
}

$mainMod = SUPER
$terminal = kitty
$browser = qutebrowser
$fileManager = nautilus
$menu = wofi --show drun

bind = CONTROL ALT, T, exec, $terminal
bind = CONTROL ALT, B, exec, $browser
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

# ----- Window navigation & fullscreen -----
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = CONTROL, F, fullscreen,

# ----- Toggle split direction (side-by-side vs top-bottom) -----
bind = CONTROL, S, layoutmsg, togglesplit

# ----- Resize with Ctrl + arrows (grow/shrink in that direction) -----
bind = CONTROL, left,  resizeactive, -10 0
bind = CONTROL, right, resizeactive, 10 0
bind = CONTROL, up,    resizeactive, 0 -10
bind = CONTROL, down,  resizeactive, 0 10

# ----- Move windows with Ctrl + Shift + arrows -----
bind = CONTROL SHIFT, left,  swapwindow, l
bind = CONTROL SHIFT, right, swapwindow, r
bind = CONTROL SHIFT, up,    swapwindow, u
bind = CONTROL SHIFT, down,  swapwindow, d

# ----- Mouse move/resize -----
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ----- Monitor switching (Ctrl + j/k) -----
bind = CONTROL, k, focusmonitor, -1
bind = CONTROL, j, focusmonitor, +1

# ----- Workspace switching (Ctrl + h/l) -----
bind = CONTROL, h, workspace, -1
bind = CONTROL, l, workspace, +1


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

windowrule = match:title hyper-power-menu, float on, border_size 0, no_shadow on, pin on
windowrule = match:title hyper-usage-popup, float on, border_size 0
windowrule = match:title hyper-calendar-popup, float on, border_size 0
windowrule = match:title hyper-services-popup, float on, border_size 0

# ----- Autostart -----
exec-once = waybar
exec-once = swayosd-server
exec-once = hyprctl keyword workspace "2, persistent:true"; hyprctl keyword workspace "3, persistent:true"; hyprctl keyword workspace "4, persistent:true"; hyprctl keyword workspace "5, persistent:true"

# ----- Volume & brightness via swayosd (shows on-screen popup) -----
# (el = repeats on hold, works while locked)
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && swayosd-client --input-volume 0
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ----- Media keys (playerctl) -----
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# ----- Screenshots (grim + slurp -> clipboard) -----
bind = , Print,          exec, grim - | wl-copy
bind = $mainMod, Print,  exec, grim -g "$(slurp)" - | wl-copy
