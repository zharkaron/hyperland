$mainMod = SUPER
$terminal = kitty
$browser = qutebrowser
$fileManager = nautilus
$menu = wofi --show drun

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

windowrule = match:title hyper-power-menu, float on, border_size 0, no_shadow on, pin on

# ----- Autostart -----
exec-once = waybar
exec-once = swayosd-server

# ----- Volume & brightness via swayosd (shows on-screen popup) -----
# (el = repeats on hold, works while locked)
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && swayosd-client --input-volume 0
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ----- Media keys (playerctl) -----
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# ----- Screenshots (grim + slurp -> clipboard) -----
bind = , Print,          exec, grim - | wl-copy
bind = $mainMod, Print,  exec, grim -g "$(slurp)" - | wl-copy
